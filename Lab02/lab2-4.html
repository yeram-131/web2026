<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>실습 2-4</title>
    <style>
      .box{
        width:300px;
        height:70px;     
        margin:0 auto;
      }
			#style1 {        
        background-color:#96e134;          
        color:white;
        text-shadow: 4px 3px 10px black;        
      }    
      #style2 {
        background-color:#07431f; 
        color: rgb(255, 255, 255);
        text-shadow: 4px 3px 10px black;
        background: linear-gradient(to right, rgb(29, 84, 135), lightblue);  
      }    
      #style3 {
        background-color:#6c0c7d;  
        color: rgb(255, 255, 255); 
        text-shadow: 4px 3px 10px black;
        background: radial-gradient(circle, rgb(255, 211, 217), rgb(164, 99, 255));     
      }    
      h1 {
        text-align: center;
        line-height: 70px;
      }
      #basic{        
      text-shadow: 4px, 3px, 10px, yellow;
      }
    </style>
  </head>
  <body>
    <div class="box" id="style1">
      <h1 id="basic">웹 개발 기초</h1>
    </div>
    <div class="box" id="style2">
      <h1>웹 개발 중급</h1>
    </div>
    <div class="box" id="style3">
      <h1>웹 개발 고급</h1>
    </div>
  </body>
</html>
