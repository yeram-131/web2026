<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서예람 - 동아리 지원서</title>
    <style>
        body{
            background-color:rgb(225, 232, 255);
        }
    </style>
</head>
<body>
    <header>
        <h1>사용자 등록 신청서</h1>
    </header>
    <main>
        <form>
            <fieldset>
                <legend><strong>기본 정보 (Essential)</strong></legend><br/>

                <label for="myid">아이디:</label><br/>
                <input type="text" id="myid" minlength="4" maxlength="12" placeholder="4~12자 영문/숫자" size="40" required autofocus><br/><br/>  
                <label for="mypw">비밀번호:</label><br/>
                <input type="text" id="mypw" size="40" required><br/><br/>
                <label for="myemail">이메일:</label><br/>
                <input type="text" id="myemail" size="40" required><br/><br/>
            </fieldset><br/>     
            <fieldset>
                <legend><strong>부가 정보 (Optional)</strong></legend><br/>

                <label for="mynum">연락처:</label><br/>
                <input type="text" id="mynum" placeholder="010-1234-5678" pattern="010-[0-9]{4}-[0-9]{4}" size="40"><br/><br/>

                관심 분야:<br/>
                <input type="checkbox" id="html" name="myfield" value="HTML5">
                <label for="html">HTML5</label>
                <input type="checkbox" id="css" name="myfield" value="CSS3">
                <label for="css">CSS3</label>
                <input type="checkbox" id="javascript" name="myfield" value="JavaScript">
                <label for="javascript">JavaScript</label><br/><br/>

                <label for="proficiency">숙련도:</label><br/>
                0 <input type="range" id="proficiency" min="0" max="10" step="1"> 10<br/><br/>
                
            </fieldset>

            <br/>
            <input type="submit" value="가입 신청">
            <input type="reset" value="초기화"><br/><br/><br/>
        </form>

    </main>

    <footer>
        <a href="index.html">홈으로</a><br/>
        &copy; 2026 Web Programming Course. All rights reserved.
    </footer>
</body>
</html>
